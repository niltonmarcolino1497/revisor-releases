<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisor de Releases Corporativos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0f0f;
    --paper: #f5f2ec;
    --paper-dark: #ede9e0;
    --accent: #c0392b;
    --ok: #2d6a4f;
    --ok-bg: #d8f3dc;
    --warn: #b5700a;
    --warn-bg: #fff3cd;
    --err: #c0392b;
    --err-bg: #fde8e8;
    --border: #d0c9bb;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --serif: 'Playfair Display', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    background: var(--ink); color: var(--paper); padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 100; height: 56px; flex-shrink: 0;
  }
  .masthead-left { display: flex; align-items: baseline; gap: 1rem; }
  .masthead-logo { font-family: var(--serif); font-size: 1.3rem; letter-spacing: -0.5px; color: var(--paper); }
  .masthead-logo span { color: var(--accent); }
  .masthead-tag { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #888; border-left: 1px solid #333; padding-left: 1rem; }
  .masthead-right { font-family: var(--mono); font-size: 0.65rem; color: #666; letter-spacing: 1px; }

  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 56px); overflow: hidden; }

  .toolbar {
    grid-column: 1 / -1; background: var(--ink); border-bottom: 1px solid #222;
    padding: 0.6rem 2rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
  }
  .btn-review {
    background: var(--accent); color: white; border: none; padding: 0.5rem 1.4rem;
    font-family: var(--mono); font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: background 0.15s, transform 0.1s; display: flex; align-items: center; gap: 0.5rem;
  }
  .btn-review:hover { background: #a93226; }
  .btn-review:active { transform: scale(0.97); }
  .btn-clear {
    background: transparent; color: #888; border: 1px solid #333; padding: 0.5rem 1rem;
    font-family: var(--mono); font-size: 0.75rem; letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
  }
  .btn-clear:hover { border-color: #666; color: #ccc; }
  .toolbar-sep { flex: 1; }
  .toolbar-badge { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 1.5px; color: #555; text-transform: uppercase; border: 1px solid #2a2a2a; padding: 0.3rem 0.6rem; }

  .panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  .panel:last-of-type { border-right: none; }
  .panel-header { background: var(--paper-dark); border-bottom: 1px solid var(--border); padding: 0.6rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
  .panel-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #888; }
  .panel-label strong { color: var(--ink); font-weight: 500; }
  .panel-actions { margin-left: auto; display: flex; gap: 0.5rem; }
  .btn-copy {
    background: transparent; border: 1px solid var(--border); color: #666;
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 1px; padding: 0.3rem 0.7rem;
    cursor: pointer; transition: all 0.15s; text-transform: uppercase; display: flex; align-items: center; gap: 0.3rem;
  }
  .btn-copy:hover { border-color: var(--ink); color: var(--ink); }

  textarea {
    flex: 1; background: white; border: none; outline: none; resize: none;
    padding: 1.5rem; font-family: var(--sans); font-size: 0.9rem; line-height: 1.8; color: var(--ink); font-weight: 300;
  }
  textarea::placeholder { color: #bbb; font-style: italic; font-family: var(--serif); }

  .output-wrap { flex: 1; overflow-y: auto; background: white; display: flex; flex-direction: column; }

  .highlighted-text {
    padding: 1.5rem; font-family: var(--sans); font-size: 0.9rem; line-height: 1.8;
    font-weight: 300; color: var(--ink); flex-shrink: 0; border-bottom: 2px solid var(--paper-dark);
    white-space: pre-wrap; word-break: break-word;
  }
  mark.highlight-err { background: #fde8e8; border-bottom: 2px solid var(--err); border-radius: 2px; cursor: help; }
  mark.highlight-warn { background: #fff3cd; border-bottom: 2px solid var(--warn); border-radius: 2px; cursor: help; }

  .interventions { padding: 1rem 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .interventions-title {
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2.5px; text-transform: uppercase;
    color: #888; margin-top: 0.5rem; margin-bottom: 0.1rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .interventions-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .intervention {
    display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.6rem 0.75rem;
    border-radius: 2px; font-size: 0.82rem; line-height: 1.5; border-left: 3px solid transparent;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .intervention.correcao { background: var(--err-bg); border-color: var(--err); }
  .intervention.aviso    { background: var(--warn-bg); border-color: var(--warn); }
  .intervention.ok       { background: var(--ok-bg); border-color: var(--ok); }
  .intervention-badge { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 2px; white-space: nowrap; font-weight: 500; margin-top: 1px; flex-shrink: 0; }
  .correcao .intervention-badge { background: var(--err); color: white; }
  .aviso    .intervention-badge { background: var(--warn); color: white; }
  .ok       .intervention-badge { background: var(--ok); color: white; }
  .intervention-text { flex: 1; color: var(--ink); }
  .intervention-text strong { font-weight: 600; }

  .stats-bar { background: var(--paper-dark); border-top: 1px solid var(--border); padding: 0.4rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; flex-shrink: 0; }
  .stat-item { display: flex; align-items: center; gap: 0.4rem; font-family: var(--mono); font-size: 0.65rem; color: #888; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-err { background: var(--err); } .dot-warn { background: var(--warn); } .dot-ok { background: var(--ok); }
  .score-badge { margin-left: auto; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 1px; padding: 0.2rem 0.6rem; border-radius: 2px; font-weight: 600; }
  .score-high { background: var(--ok-bg); color: var(--ok); }
  .score-mid  { background: var(--warn-bg); color: var(--warn); }
  .score-low  { background: var(--err-bg); color: var(--err); }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem; padding: 2rem; text-align: center; }
  .empty-icon { font-size: 2.5rem; opacity: 0.3; }
  .empty-text { font-family: var(--serif); font-style: italic; font-size: 1rem; color: #bbb; }
  .empty-sub  { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; color: #ccc; }

  .char-counter { font-family: var(--mono); font-size: 0.6rem; color: #aaa; margin-left: auto; letter-spacing: 1px; }

  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--ink); color: var(--paper); font-family: var(--mono); font-size: 0.72rem; letter-spacing: 1px; padding: 0.6rem 1.2rem; border-left: 3px solid var(--accent); opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; transform: translateY(0); }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #d0c9bb; border-radius: 10px; }
</style>
</head>
<body>

<header>
  <div class="masthead-left">
    <div class="masthead-logo">Revisor <span>Release</span></div>
    <div class="masthead-tag">Editor Corporativo</div>
  </div>
  <div class="masthead-right">Manual de Boas Práticas · v3.0 · offline</div>
</header>

<main>
  <div class="toolbar">
    <button class="btn-review" onclick="reviewRelease()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Revisar Release
    </button>
    <button class="btn-clear" onclick="clearAll()">Limpar</button>
    <div class="toolbar-sep"></div>
    <div class="toolbar-badge">✦ Motor local · sem API · sem internet</div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label"><strong>01</strong> · Texto Original</span>
      <span class="char-counter" id="charCounter">0 caracteres</span>
    </div>
    <textarea id="inputText" placeholder="Cole aqui o texto do release corporativo para revisão…" oninput="updateCounter()" spellcheck="false"></textarea>
    <div class="stats-bar">
      <span class="stat-item" style="color:#aaa;font-family:var(--mono);font-size:0.62rem;letter-spacing:1px;">AGUARDANDO TEXTO</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label"><strong>02</strong> · Diagnóstico Editorial</span>
      <div class="panel-actions">
        <button class="btn-copy" onclick="copyReport()" id="btnCopy" style="display:none">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar relatório
        </button>
      </div>
    </div>
    <div class="output-wrap">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-text">Nenhuma revisão realizada ainda</div>
        <div class="empty-sub">Cole um texto e clique em Revisar</div>
      </div>
      <div id="highlightedText" class="highlighted-text" style="display:none"></div>
      <div id="interventions" class="interventions" style="display:none"></div>
    </div>
    <div class="stats-bar" id="statsBar" style="display:none">
      <div class="stat-item"><div class="stat-dot dot-err"></div><span id="statCorrecao">0</span></div>
      <div class="stat-item"><div class="stat-dot dot-warn"></div><span id="statAviso">0</span></div>
      <div class="stat-item"><div class="stat-dot dot-ok"></div><span id="statOk">0</span></div>
      <div class="score-badge" id="scoreBadge"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ══════════════════════════════════════
// DICIONÁRIOS DO MANUAL
// ══════════════════════════════════════

const ADJETIVOS_PROIBIDOS = [
  'importante','importantes','expressivo','expressiva','expressivos','expressivas',
  'significativo','significativa','significativos','significativas',
  'histórico','histórica','históricos','históricas',
  'robusto','robusta','robustos','robustas',
  'inovador','inovadora','inovadores','inovadoras',
  'relevante','relevantes','excepcional','excepcionais',
  'maravilhoso','maravilhosa','grandioso','grandiosa','grandiosos','grandiosas',
  'inspirador','inspiradora','inspiradores','inspiradoras',
  'elitizado','elitizada','surpreendente','surpreendentes',
  'extraordinário','extraordinária','extraordinários','extraordinárias',
  'notável','notáveis','pioneiro','pioneira','pioneiros','pioneiras',
  'excelente','excelentes','impactante','impactantes',
  'inédito','inédita','inéditos','inéditas'
];

const FRASES_PROIBIDAS = [
  'grande avanço','grande avanços','marco histórico','marco importante',
  'passo importante','resultado expressivo','resultados expressivos',
  'impacto positivo','impacto significativo'
];

const VERBOS_PROIBIDOS = [
  'admitiu','admite','admitem','reconheceu','reconhece','reconhecem',
  'lamentou','lamenta','lamentam','garantiu','garante','garantem',
  'destaca','destacou','destacam','ressalta','ressaltou','ressaltam',
  'relembra','relembrou','relembram','pontua','pontuou','pontuam',
  'celebra','celebrou','celebram','enaltece','enalteceu','enaltecem',
  'exalta','exaltou','exaltam','comemora','comemorou','comemoram'
];

const VERBOS_OK = ['afirmou','declarou','informou','avaliou','disse','afirma','declara','informa','avalia'];

const PREDICADOS_EMOCIONAIS = [
  'emocionado','emocionada','emocionados','emocionadas',
  'feliz','animado','animada','animados','animadas',
  'orgulhoso','orgulhosa','orgulhosos','orgulhosas',
  'entusiasmado','entusiasmada','entusiasmados','entusiasmadas',
  'empolgado','empolgada','empolgados','empolgadas',
  'satisfeito','satisfeita','satisfeitos','satisfeitas'
];

const NUMEROS_EXTENSO = [
  /\b(onze|doze|treze|quatorze|catorze|quinze|dezesseis|dezessete|dezoito|dezenove)\b/gi,
  /\b(vinte|trinta|quarenta|cinquenta|sessenta|setenta|oitenta|noventa)\b/gi,
  /\b(duzentos?|trezentos?|quatrocentos?|quinhentos?|seiscentos?|setecentos?|oitocentos?|novecentos?)\b/gi,
  /\b(dois mil|tr[eê]s mil|quatro mil|cinco mil|seis mil|sete mil|oito mil|nove mil|dez mil)\b/gi
];

const EXPRESSOES_VAGAS = [
  'em breve','muito em breve','nos próximos dias','nos próximos meses',
  'a curto prazo','a médio prazo','a longo prazo','no futuro próximo',
  'oportunamente','em tempo hábil','futuramente','proximamente'
];

const DADOS_RE = /R\$\s*[\d,.]+|[\d,.]+\s*%|[\d,.]+\s*(MW|GW|MWh|GWh|km|m²|m³|ha|toneladas?|mil toneladas?|unidades?|empregos?|postos? de trabalho|pontos?)/i;

// ══════════════════════════════════════
// MOTOR DE REVISÃO
// ══════════════════════════════════════

let reportText = '';

function reviewRelease() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('Cole um texto antes de revisar.'); return; }

  const interventions = [];
  const highlights = [];
  const paragraphs = text.split(/\n+/).filter(p => p.trim().length > 0);
  const titleLine = paragraphs[0] || '';
  const lide = paragraphs.slice(0, 2).join(' ');

  // ── TÍTULO ──
  if (DADOS_RE.test(titleLine)) {
    interventions.push({ tipo:'ok', cat:'Título', txt:'Título contém dado mensurável (valor, percentual ou indicador).' });
  } else {
    interventions.push({ tipo:'correcao', cat:'Título', txt:'Título sem dado mensurável. Inclua percentual, valor ou indicador. Modelo: "[Empresa] registra alta de 12% em geração renovável no trimestre."' });
  }

  const tw = titleLine.split(/\s+/).length;
  if (tw > 18) {
    interventions.push({ tipo:'aviso', cat:'Título', txt:`Título longo (${tw} palavras). Recomendado: até 15 palavras com dado-chave objetivo.` });
  } else {
    interventions.push({ tipo:'ok', cat:'Título', txt:`Extensão do título adequada (${tw} palavras).` });
  }

  // ── LIDE / 5Q ──
  const qOque   = /\b(investiu|investirá|lança|lançou|anuncia|anunciou|conclui|concluiu|assina|assinou|inicia|iniciou|implementa|implementou|amplia|ampliou|reduz|reduziu|registra|registrou|apresenta|apresentou|opera|operou|consolida|consolidou|avança|avançou|cresce|cresceu|fecha|fechou|atinge|atingiu|alcança|alcançou)\b/i.test(lide);
  const qQuem   = /\b([A-ZÁÉÍÓÚÀÂÊÔÃÕ][a-záéíóúàâêôãõ]+ (S\.A\.|S\/A|Ltda\.?|Group|Brasil|Energia|Capital|Holding|Participações|Investimentos))|(\ba empresa\b|\ba companhia\b|\bo grupo\b|\ba organização\b)/i.test(lide);
  const qQuando = /\b(\d{1,2}\s+de\s+\w+\s+de\s+\d{4}|\d{4}|1[TtºO]|\b[2-4][TtºO]\b|primeiro trimestre|segundo trimestre|terceiro trimestre|quarto trimestre)\b/i.test(lide);
  const qOnde   = /\b(em [A-ZÁÉÍÓÚÀÂÊÔÃÕ]|no Brasil|na [A-ZÁÉÍÓÚÀÂÊÔÃÕ]|unidade|sede|planta|parque|complexo|região)\b/i.test(lide);
  const qPorque = /\b(com objetivo|para (ampliar|reduzir|expandir|consolidar|melhorar|aumentar|fortalecer|diversificar)|visando|a fim de|com vistas|com o intuito)\b/i.test(lide);

  const faltando = [];
  if (!qOque)   faltando.push('O quê');
  if (!qQuem)   faltando.push('Quem');
  if (!qQuando) faltando.push('Quando');
  if (!qOnde)   faltando.push('Onde');
  if (!qPorque) faltando.push('Por quê/Para quê');

  if (faltando.length === 0) {
    interventions.push({ tipo:'ok', cat:'Lide · 5Q', txt:'Lide cobre os cinco elementos jornalísticos (O quê, Quem, Quando, Onde, Por quê).' });
  } else if (faltando.length <= 2) {
    interventions.push({ tipo:'aviso', cat:'Lide · 5Q', txt:`Lide possivelmente incompleto. Elemento(s) não identificado(s): ${faltando.join(', ')}. Verifique se estão presentes de forma explícita.` });
  } else {
    interventions.push({ tipo:'correcao', cat:'Lide · 5Q', txt:`Lide não responde os 5Q. Ausentes ou não identificados: ${faltando.join(', ')}.` });
  }

  if (DADOS_RE.test(paragraphs[0] || '')) {
    interventions.push({ tipo:'ok', cat:'Lide · Dados', txt:'Lide contém dado verificável (valor, percentual ou indicador).' });
  } else {
    interventions.push({ tipo:'correcao', cat:'Lide · Dados', txt:'Lide sem dado verificável. O primeiro parágrafo deve trazer pelo menos um número, valor ou percentual concreto.' });
  }

  // ── ADJETIVOS PROIBIDOS ──
  let adjCount = 0;
  const adjSet = new Set();
  ADJETIVOS_PROIBIDOS.forEach(adj => {
    const re = new RegExp(`\\b${adj.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`, 'gi');
    let m;
    while ((m = re.exec(text)) !== null) {
      adjCount++;
      adjSet.add(m[0].toLowerCase());
      highlights.push({ start: m.index, end: m.index + m[0].length, tipo:'err', tip:`Adjetivo subjetivo proibido: "${m[0]}"` });
    }
  });
  FRASES_PROIBIDAS.forEach(frase => {
    const re = new RegExp(frase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    let m;
    while ((m = re.exec(text)) !== null) {
      adjCount++;
      adjSet.add(m[0].toLowerCase());
      highlights.push({ start: m.index, end: m.index + m[0].length, tipo:'err', tip:`Expressão subjetiva proibida: "${m[0]}"` });
    }
  });

  if (adjCount === 0) {
    interventions.push({ tipo:'ok', cat:'Adjetivos e expressões', txt:'Nenhum adjetivo subjetivo ou expressão proibida identificada.' });
  } else {
    interventions.push({ tipo:'correcao', cat:'Adjetivos e expressões', txt:`${adjCount} ocorrência(s) de adjetivo(s)/expressão(ões) subjetiva(s): ${[...adjSet].map(a=>`"${a}"`).join(', ')}. Substitua por dados concretos.` });
  }

  // ── VERBOS DECLARATIVOS ──
  let verbCount = 0;
  const verbSet = new Set();
  VERBOS_PROIBIDOS.forEach(v => {
    const re = new RegExp(`\\b${v}\\b`, 'gi');
    let m;
    while ((m = re.exec(text)) !== null) {
      verbCount++;
      verbSet.add(m[0].toLowerCase());
      highlights.push({ start: m.index, end: m.index + m[0].length, tipo:'err', tip:`Verbo não neutro: "${m[0]}" — use afirmou, declarou, informou, avaliou` });
    }
  });

  if (verbCount === 0) {
    interventions.push({ tipo:'ok', cat:'Verbos declarativos', txt:'Nenhum verbo declarativo inadequado identificado.' });
  } else {
    interventions.push({ tipo:'correcao', cat:'Verbos declarativos', txt:`Verbo(s) não neutro(s): ${[...verbSet].map(v=>`"${v}"`).join(', ')}. Use apenas: afirmou, declarou, informou, avaliou.` });
  }

  // ── PREDICADOS EMOCIONAIS ──
  let emocSet = new Set();
  PREDICADOS_EMOCIONAIS.forEach(p => {
    const re = new RegExp(`\\b${p}\\b`, 'gi');
    let m;
    while ((m = re.exec(text)) !== null) {
      emocSet.add(m[0].toLowerCase());
      highlights.push({ start: m.index, end: m.index + m[0].length, tipo:'err', tip:`Predicado emocional: "${m[0]}" — remover` });
    }
  });
  if (emocSet.size > 0) {
    interventions.push({ tipo:'correcao', cat:'Predicados emocionais', txt:`Predicado(s) emocional(is) atribuído(s) a fonte: ${[...emocSet].map(e=>`"${e}"`).join(', ')}. Remova — releases não atribuem estado emocional a porta-vozes.` });
  }

  // ── NUMERAIS ──
  let numSet = new Set();
  NUMEROS_EXTENSO.forEach(re => {
    const r = new RegExp(re.source, 'gi');
    let m;
    while ((m = r.exec(text)) !== null) {
      numSet.add(m[0].toLowerCase());
      highlights.push({ start: m.index, end: m.index + m[0].length, tipo:'warn', tip:`Número por extenso: "${m[0]}" — verifique se deve ser algarismo` });
    }
  });
  if (numSet.size === 0) {
    interventions.push({ tipo:'ok', cat:'Numerais', txt:'Numerais acima de dez aparecem em algarismos (padrão Folha).' });
  } else {
    interventions.push({ tipo:'aviso', cat:'Numerais', txt:`Número(s) por extenso a verificar: ${[...numSet].map(n=>`"${n}"`).join(', ')}. Regra: algarismos para valores financeiros, percentuais, datas e estatísticas. Por extenso apenas zero a dez, cem e mil.` });
  }

  // ── EXPRESSÕES TEMPORAIS VAGAS ──
  let vagSet = new Set();
  EXPRESSOES_VAGAS.forEach(exp => {
    const re = new RegExp(`\\b${exp.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`, 'gi');
    let m;
    while ((m = re.exec(text)) !== null) {
      vagSet.add(m[0].toLowerCase());
      highlights.push({ start: m.index, end: m.index + m[0].length, tipo:'warn', tip:`Expressão temporal vaga: "${m[0]}" — substituir por data específica` });
    }
  });
  if (vagSet.size > 0) {
    interventions.push({ tipo:'correcao', cat:'Precisão temporal', txt:`Expressão(ões) temporal(is) vaga(s): ${[...vagSet].map(e=>`"${e}"`).join(', ')}. Substitua por data ou período específico (ex: "até 31 de dezembro de 2026").` });
  } else {
    interventions.push({ tipo:'ok', cat:'Precisão temporal', txt:'Sem expressões temporais vagas identificadas.' });
  }

  // ── DADOS NO CORPO ──
  const corpo = paragraphs.slice(1);
  if (corpo.length > 0) {
    if (corpo.some(p => DADOS_RE.test(p))) {
      interventions.push({ tipo:'ok', cat:'Dados no corpo', txt:'Corpo do release contém dados mensuráveis (valores, percentuais ou indicadores).' });
    } else {
      interventions.push({ tipo:'aviso', cat:'Dados no corpo', txt:'Corpo do release sem dados mensuráveis identificados. Inclua valores, percentuais ou indicadores para sustentar as afirmações.' });
    }
  }

  // ── ESTRUTURA / PIRÂMIDE ──
  if (paragraphs.length < 3) {
    interventions.push({ tipo:'aviso', cat:'Estrutura', txt:`Release curto (${paragraphs.length} parágrafo(s)). A pirâmide invertida recomenda: lide + desenvolvimento (impacto, dados, contexto, declaração) + próximos passos.` });
  } else if (paragraphs.length >= 4) {
    interventions.push({ tipo:'ok', cat:'Estrutura', txt:`Extensão adequada (${paragraphs.length} parágrafos). Verifique se a ordem segue: impacto estratégico → dados → contexto → declaração → próximos passos.` });
  } else {
    interventions.push({ tipo:'aviso', cat:'Estrutura', txt:`Release com ${paragraphs.length} parágrafos. Verifique se cobre todos os elementos da pirâmide invertida.` });
  }

  // ── DECLARAÇÃO OFICIAL ──
  const temVerboOk = VERBOS_OK.some(v => new RegExp(`\\b${v}\\b`,'i').test(text));
  const temAspas = /[""«»]/.test(text) || (text.includes('"') && text.split('"').length > 2);
  if (temVerboOk && temAspas) {
    interventions.push({ tipo:'ok', cat:'Declaração oficial', txt:'Declaração de porta-voz identificada com verbo neutro e aspas.' });
  } else if (temVerboOk || temAspas) {
    interventions.push({ tipo:'aviso', cat:'Declaração oficial', txt:'Declaração parcialmente identificada. Certifique-se de que a citação usa verbo neutro (afirmou, declarou, informou, avaliou) e aspas.' });
  } else {
    interventions.push({ tipo:'aviso', cat:'Declaração oficial', txt:'Nenhuma declaração de porta-voz identificada. Considere incluir citação com verbo neutro para dar voz institucional ao release.' });
  }

  renderOutput(text, interventions, highlights);
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════

function renderOutput(text, interventions, highlights) {
  document.getElementById('emptyState').style.display = 'none';

  // Texto com marcações
  const ht = document.getElementById('highlightedText');
  ht.style.display = 'block';
  ht.innerHTML = buildHighlightedHTML(text, highlights);

  // Cards de intervenção
  const intDiv = document.getElementById('interventions');
  intDiv.style.display = 'flex';
  intDiv.innerHTML = '';

  const correcoes = interventions.filter(i => i.tipo === 'correcao');
  const avisos    = interventions.filter(i => i.tipo === 'aviso');
  const oks       = interventions.filter(i => i.tipo === 'ok');

  const addTitle = label => {
    const t = document.createElement('div');
    t.className = 'interventions-title';
    t.textContent = label;
    intDiv.appendChild(t);
  };

  let idx = 0;
  if (correcoes.length) { addTitle('Correções'); correcoes.forEach(i => addCard(intDiv, i, idx++)); }
  if (avisos.length)    { addTitle('Avisos');    avisos.forEach(i => addCard(intDiv, i, idx++)); }
  if (oks.length)       { addTitle('Pontos ok'); oks.forEach(i => addCard(intDiv, i, idx++)); }

  // Stats + score
  const total = interventions.length;
  const score = Math.round(((oks.length + avisos.length * 0.5) / total) * 100);

  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('statCorrecao').textContent = `${correcoes.length} correção${correcoes.length !== 1 ? 'ões' : ''}`;
  document.getElementById('statAviso').textContent    = `${avisos.length} aviso${avisos.length !== 1 ? 's' : ''}`;
  document.getElementById('statOk').textContent       = `${oks.length} ponto${oks.length !== 1 ? 's' : ''} ok`;

  const badge = document.getElementById('scoreBadge');
  badge.textContent = `${score}% conformidade`;
  badge.className = 'score-badge ' + (score >= 75 ? 'score-high' : score >= 50 ? 'score-mid' : 'score-low');

  reportText = buildReportText(interventions, score);
  document.getElementById('btnCopy').style.display = 'flex';
}

function addCard(container, item, idx) {
  const div = document.createElement('div');
  div.className = `intervention ${item.tipo}`;
  div.style.animationDelay = `${idx * 35}ms`;
  const badge = document.createElement('div');
  badge.className = 'intervention-badge';
  badge.textContent = { correcao:'Correção', aviso:'Aviso', ok:'Ponto ok' }[item.tipo];
  const body = document.createElement('div');
  body.className = 'intervention-text';
  body.innerHTML = `<strong>${item.cat}</strong> — ${item.txt}`;
  div.appendChild(badge);
  div.appendChild(body);
  container.appendChild(div);
}

function buildHighlightedHTML(text, highlights) {
  if (!highlights.length) return escHtml(text);
  highlights.sort((a,b) => a.start - b.start);
  let out = '', cursor = 0;
  for (const h of highlights) {
    if (h.start < cursor) continue;
    out += escHtml(text.slice(cursor, h.start));
    const cls = h.tipo === 'err' ? 'highlight-err' : 'highlight-warn';
    out += `<mark class="${cls}" title="${escHtml(h.tip)}">${escHtml(text.slice(h.start, h.end))}</mark>`;
    cursor = h.end;
  }
  out += escHtml(text.slice(cursor));
  return out;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildReportText(interventions, score) {
  const lines = [`RELATÓRIO DE REVISÃO EDITORIAL\n${'='.repeat(40)}\nConformidade: ${score}%\n`];
  for (const tipo of ['correcao','aviso','ok']) {
    const g = interventions.filter(i => i.tipo === tipo);
    if (!g.length) continue;
    lines.push({ correcao:'CORREÇÕES', aviso:'AVISOS', ok:'PONTOS OK' }[tipo]);
    g.forEach(i => lines.push(`• [${i.cat}] ${i.txt}`));
    lines.push('');
  }
  return lines.join('\n');
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('charCounter').textContent = '0 caracteres';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('highlightedText').style.display = 'none';
  document.getElementById('interventions').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('btnCopy').style.display = 'none';
  reportText = '';
}

function updateCounter() {
  const len = document.getElementById('inputText').value.length;
  document.getElementById('charCounter').textContent = `${len.toLocaleString('pt-BR')} caracteres`;
}

function copyReport() {
  if (!reportText) return;
  navigator.clipboard.writeText(reportText).then(() => showToast('Relatório copiado!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
